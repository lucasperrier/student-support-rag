services:
  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama:/root/.ollama
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8001:8001"
    volumes:
      # Persist uploads, sqlite DB, vector DB between runs
      - ./data:/app/data
    environment:
      - PYTHONUNBUFFERED=1
      # Preferred for ollama Python client (used in agents/utils.py)
      - OLLAMA_HOST=http://ollama:11434
      # Kept for compatibility/documentation (not currently read by the code)
      - OLLAMA_BASE_URL=http://ollama:11434
    depends_on:
      - ollama

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        # This becomes the URL React uses for fetch()
        - VITE_API_URL=http://localhost:8001
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  ollama:
    # Named volume to persist downloaded models