services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8001:8001"
    volumes:
      # Persist uploads, sqlite DB, vector DB between runs
      - ./data:/app/data
    environment:
      - PYTHONUNBUFFERED=1

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        # This becomes the URL React uses for fetch()
        - VITE_API_URL=http://localhost:8001
    ports:
      - "8080:80"
    depends_on:
      - backend